version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anoboy-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      REQUEST_TIMEOUT: 15000
      REQUEST_RETRIES: 3
      REQUEST_QUEUE_CONCURRENCY: 5
      BASE_URL: https://anoboy.be
      ALLOWED_ORIGINS: '*'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anoboy-net

  redis:
    image: redis:7-alpine
    container_name: anoboy-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - anoboy-net
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

volumes:
  redis-data:

networks:
  anoboy-net:
    driver: bridge
